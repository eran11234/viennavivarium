name: Build & deploy site

# Rebuilds the site and publishes to GitHub Pages on every push to main.
# Edit a translation, the data, or the build scripts -> push -> live in ~2 min.

on:
  push:
    branches: [main]
  workflow_dispatch:        # also allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install Python deps
        run: pip install openpyxl

      - name: Build data + pages (with all PDFs)
        env:
          FULL_PDFS: "1"
        run: |
          python build_site.py
          python gen_site.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: vivarium_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
